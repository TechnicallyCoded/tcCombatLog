block-commands-by-default: true

allowed-commands:
  - "^\\/d(upe)?( [0-9]+)?$"
  - "^\\/w .*$"
  - "^\\/whisper .*$"
  - "^\\/msg .*$"
  - "^\\/minecraft:msg .*$"
  - "^\\/fmsg .*$"
  - "^\\/friendmsg .*$"
  - "^\\/friendlist( [0-9]+)?$"
  - "^\\/tpahere .*$"
  - "^\\/team info .*$"
  - "^\\/clan info .*$"
  - "^\\/teammsg .*$"
  - "^\\/tell .*$"
  - "^\\/ignore .*$"

blocked-commands: []

fly:
  # Message sent when fly is disabled during combat
  # Use & for color codes. Empty string to disable message.
  disable-message: "&cFlight has been disabled during combat!"

  # Sound played when fly is disabled during combat
  # Empty string to disable sound. Use Bukkit Sound enum names.
  disable-sound: "ENTITY_ENDERMAN_TELEPORT"

  # Message sent when fly is re-enabled after combat
  # Empty string to disable message.
  enable-message: "&aYou can now fly!"

  # Sound played when fly is re-enabled after combat
  # Empty string to disable sound. Use Bukkit Sound enum names.
  enable-sound: "BLOCK_LEVER_CLICK"